<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redirecting...</title>

<script>
window.location.replace("https://studiesquest.website");
</script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#031f08;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#0f7a33 0%,#031f08 70%);
z-index:-1;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
margin:0;
color:#32ff7e;
text-shadow:0 0 15px #32ff7e;
letter-spacing:2px;
font-size:28px;
}

p{
margin-top:10px;
opacity:0.7;
font-size:14px;
}

a{
display:inline-block;
margin-top:15px;
color:#32ff7e;
text-decoration:none;
font-weight:bold;
}

a:hover{
text-shadow:0 0 10px #32ff7e;
}

.loader{
margin:20px auto 0 auto;
width:180px;
height:5px;
background:#062b12;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(50,255,126,0.25);
}

.loader::after{
content:"";
display:block;
height:100%;
width:40%;
background:#32ff7e;
animation:load 1s infinite linear;
}

@keyframes load{
0%{transform:translateX(-100%);}
100%{transform:translateX(250%);}
}
</style>
</head>

<body>

<div class="container">
<h1>StudiesQuest</h1>
<p>Redirecting...</p>

<div class="loader"></div>

<a href="https://studiesquest.website">Click here if it doesn't open</a>
</div>

</body>
</html>
