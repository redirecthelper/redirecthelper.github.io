<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudiesQuest</title>
  <link id="favicon" rel="icon" href="https://studiesquest.website/output.jpg">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <iframe src="https://studiesquest.website" allow="fullscreen"></iframe>
  <script>
    // Mirror title & favicon changes from the StudiesQuest iframe
    window.addEventListener('message', function(e) {
      if (!e.data || e.data.type !== 'sq-stealth') return;
      if (e.data.title) document.title = e.data.title;
      if (e.data.favicon) {
        var fav = document.getElementById('favicon');
        if (fav) fav.href = e.data.favicon;
      }
    });
  </script>
</body>
</html>
