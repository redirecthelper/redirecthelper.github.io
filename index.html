<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Classes</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .launcher {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,230,118,0.1);
      max-width: 400px;
      width: 90%;
    }
    .launcher h1 {
      margin: 0 0 10px;
      font-size: 24px;
      color: #00e676;
    }
    .launcher p {
      margin: 0 0 30px;
      color: #888;
      font-size: 14px;
      line-height: 1.5;
    }
    button {
      padding: 14px 28px;
      font-size: 16px;
      font-weight: bold;
      background: #00e676;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,230,118,0.3);
      transition: all 0.2s;
      width: 100%;
    }
    button:hover {
      background: #00bfa5;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,230,118,0.4);
    }
  </style>
</head>
<body>

  <div class="launcher" id="launcher">
    <h1>Initialize Proxy</h1>
    <p>Click below to launch the proxy in a secure, hidden about:blank tab that won't show up in your school browser history.</p>
    <button onclick="launchProxy()">Launch Secure Session</button>
  </div>

  <script>

    const TARGET_URL = "https://proxyhelper.proxyhelper.workers.dev";

    function launchProxy() {

      let win = window.open('about:blank', '_blank');
      
      if (!win || win.closed || typeof win.closed === 'undefined') {
        alert("Your browser blocked the pop-up! Please click the icon in the URL bar to allow pop-ups and try again.");
        return;
      }

      document.getElementById('launcher').innerHTML = "<h2 style='color:#00e676; margin-bottom: 10px;'>Session Active</h2><p style='color:#888;'>The proxy is running in a hidden tab. You can safely close this page now to hide your tracks.</p>";
      win.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>My Drive - Google Drive</title>
          <link rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png">
          <style>
            body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
            iframe { width: 100vw; height: 100vh; border: none; }
          </style>
        </head>
        <body>
          <iframe id="sqFrame" src="${TARGET_URL}" allow="autoplay; fullscreen; cursor-lock"></iframe>
        </body>
        </html>
      `);
      win.document.close();
    }
  </script>
</body>
</html>
